<div class="relative flex flex-col min-h-screen bg-gray-50">
  <aside
    class="fixed inset-y-0 left-0 z-50 w-72 bg-white shadow-[4px_0_24px_rgba(0,0,0,0.02)] border-r border-gray-100 transform transition-transform duration-300 ease-in-out flex flex-col"
    [ngClass]="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
  >
    <div class="h-20 flex items-center justify-between px-8 border-b border-gray-50">
      <img src="assets/main_logo.svg" alt="FEELESTATE logo" class="w-32" />
      <button (click)="closeSidebar()" class="md:hidden p-2 text-gray-400 hover:text-orange-500 rounded-lg transition-colors">
        <ng-icon name="lucideX" class="text-xl"></ng-icon>
      </button>
    </div>

    <nav class="flex-1 px-4 py-8 overflow-y-auto">
      <ul class="space-y-2">
        <li>
          <a
            routerLink="/"
            routerLinkActive="bg-orange-50 text-orange-600 font-semibold"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeSidebar()"
            class="flex items-center justify-between p-3.5 rounded-xl transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium"
          >
            <span class="flex items-center gap-3">
              <ng-icon name="lucideLayoutDashboard" class="text-lg"></ng-icon>
              Dashboard
            </span>
            <ng-icon name="lucideChevronRight" class="text-base text-orange-400"></ng-icon>
          </a>
        </li>
        <li>
          <a
            routerLink="/products"
            routerLinkActive="bg-orange-50 text-orange-600 font-semibold"
            (click)="closeSidebar()"
            class="flex items-center justify-between p-3.5 rounded-xl transition-all text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium"
          >
            <span class="flex items-center gap-3">
              <ng-icon name="lucideMap" class="text-lg"></ng-icon>
              Meine Touren
            </span>
            <ng-icon name="lucideChevronRight" class="text-base text-orange-400"></ng-icon>
          </a>
        </li>
        <li class="pt-8 pb-2 px-3">
          <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Erweitert</p>
        </li>
        <li>
          <a href="#" class="flex items-center justify-between p-3.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium transition-all cursor-pointer">
            <span class="flex items-center gap-3">
              <ng-icon name="lucideVideo" class="text-lg"></ng-icon>
              AI Video Maker
            </span>
          </a>
        </li>
        <li>
          <a href="#" class="flex items-center justify-between p-3.5 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 font-medium transition-all cursor-pointer">
            <span class="flex items-center gap-3">
              <ng-icon name="lucideSettings" class="text-lg"></ng-icon>
              Einstellungen
            </span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="p-4 border-t border-gray-50">
      <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors cursor-pointer">
        <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 shrink-0 border-2 border-white shadow-sm">
          <ng-icon name="lucideUser" class="text-lg"></ng-icon>
        </div>
        <div class="flex-1 overflow-hidden">
          <p class="text-sm font-semibold text-gray-800 truncate">Johannes Kiese</p>
          <p class="text-xs text-gray-500 truncate">johannes@feelestate.com</p>
        </div>
      </div>
    </div>
  </aside>

  <div *ngIf="sidebarOpen" class="fixed inset-0 z-40 lg:hidden" (click)="closeSidebar()">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity"></div>
  </div>

  <div class="flex-1 flex flex-col transition-all duration-300 ease-in-out" [ngClass]="sidebarOpen ? 'lg:ml-72' : 'ml-0'">
    <header class="h-20 flex items-center justify-between px-4 sm:px-6 lg:px-10 bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-30 transition-all">
      <div class="flex items-center gap-4">
        <button
          aria-label="Toggle sidebar"
          (click)="toggleSidebar()"
          class="p-2.5 rounded-xl bg-white border border-gray-200 text-gray-600 hover:text-orange-500 hover:border-orange-200 hover:bg-orange-50 transition-all shadow-sm"
        >
          <ng-icon *ngIf="sidebarOpen" name="lucideX" class="text-xl"></ng-icon>
          <ng-icon *ngIf="!sidebarOpen" name="lucideMenu" class="text-xl"></ng-icon>
        </button>
        <a routerLink="/">
          <img src="assets/main_logo.svg" alt="FEELESTATE logo" class="w-28 cursor-pointer" />
        </a>
      </div>

      <div class="flex items-center gap-3 sm:gap-5">
        <button class="relative p-2 text-gray-500 hover:text-orange-500 transition-colors">
          <ng-icon name="lucideBell" class="text-xl"></ng-icon>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-orange-500 rounded-full border border-white"></span>
        </button>

        <div class="relative" (click)="$event.stopPropagation()">
          <button
            aria-label="Open user menu"
            [attr.aria-expanded]="userMenuOpen"
            (click)="toggleUserMenu($event)"
            class="flex items-center gap-2 sm:gap-3 sm:pl-5 sm:border-l border-gray-200 rounded-xl px-1.5 sm:px-0 py-1 text-gray-700 hover:text-orange-500 transition-colors"
          >
            <div class="hidden sm:block text-right">
              <div class="text-sm font-bold text-gray-800 leading-tight">Johannes Kiese</div>
              <div class="text-xs text-green-600 font-semibold">Online</div>
            </div>
            <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 border-2 border-white shadow-sm">
              <ng-icon name="lucideUser" class="text-lg"></ng-icon>
            </div>
            <ng-icon name="lucideChevronDown" class="text-gray-400 text-base transition-transform" [ngClass]="userMenuOpen ? 'rotate-180 text-orange-500' : ''"></ng-icon>
          </button>

          <div
            class="absolute right-0 top-[calc(100%+10px)] w-[calc(100vw-1.5rem)] max-w-[22rem] sm:w-80 bg-white border border-gray-100 rounded-2xl shadow-[0_20px_40px_rgba(0,0,0,0.08)] p-2.5 origin-top-right transition-all duration-200"
            [ngClass]="userMenuOpen ? 'opacity-100 scale-100 pointer-events-auto' : 'opacity-0 scale-95 pointer-events-none'"
          >
            <div class="p-3 rounded-xl bg-gray-50 border border-gray-100 mb-2">
              <p class="text-sm font-bold text-gray-800">Johannes Kiese</p>
              <p class="text-xs text-gray-500 mt-0.5">johannes@feelestate.com</p>
            </div>
            <button class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-600 transition-colors flex items-center gap-3"><ng-icon name="lucideUserCog" class="text-base"></ng-icon>Profil bearbeiten</button>
            <button class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-600 transition-colors flex items-center gap-3"><ng-icon name="lucideCreditCard" class="text-base"></ng-icon>Abonnement und Abrechnung</button>
            <button class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-600 transition-colors flex items-center gap-3"><ng-icon name="lucideSettings" class="text-base"></ng-icon>Kontoeinstellungen</button>
            <div class="h-px bg-gray-100 my-2"></div>
            <button class="w-full text-left px-3 py-2.5 rounded-xl text-sm text-red-600 hover:bg-red-50 transition-colors flex items-center gap-3"><ng-icon name="lucideLogOut" class="text-base"></ng-icon>Abmelden</button>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 w-full max-w-full">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
