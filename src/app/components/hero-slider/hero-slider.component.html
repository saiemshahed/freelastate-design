<section class="space-y-5">
  <div class="flex items-center justify-between px-1">
    <div>
      <h2 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">Top-Highlights fuer Ihre Zielgruppe</h2>
      <p class="text-sm text-gray-500 mt-1">Automatisch rotierender Slider fuer aufmerksamkeitsstarke Praesentationen</p>
    </div>
    <span class="hidden sm:inline-flex items-center rounded-full border border-orange-200 bg-orange-50 px-3 py-1 text-xs font-semibold text-orange-600">Live-Slider</span>
  </div>

  <div class="rounded-[28px] border border-gray-200/80 bg-white shadow-[0_16px_50px_rgba(15,23,42,0.08)] p-2.5 sm:p-4">
    <div class="relative overflow-hidden rounded-[22px] h-[260px] sm:h-[380px] lg:h-[450px]">
      <div
        class="absolute inset-0 bg-cover bg-center transition-all duration-700 scale-105"
        [style.background-image]="'url(' + slides[currentIndex].imageUrl + ')'"
      ></div>
      <div class="absolute inset-0 bg-gradient-to-b from-black/25 via-black/10 to-black/55"></div>

      <div class="absolute inset-x-0 top-0 h-28 bg-gradient-to-b from-black/20 to-transparent"></div>

      <button
        type="button"
        (click)="prevSlide()"
        class="absolute left-3 sm:left-5 top-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-white/12 backdrop-blur-md border border-white/30 text-white hover:bg-white/25 transition-colors flex items-center justify-center"
        aria-label="Vorheriger Slide"
      >
        <ng-icon name="lucideChevronLeft" class="text-[22px]"></ng-icon>
      </button>

      <button
        type="button"
        (click)="nextSlide()"
        class="absolute right-3 sm:right-5 top-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-white/12 backdrop-blur-md border border-white/30 text-white hover:bg-white/25 transition-colors flex items-center justify-center"
        aria-label="Naechster Slide"
      >
        <ng-icon name="lucideChevronRight" class="text-[22px]"></ng-icon>
      </button>

      <div class="absolute bottom-7 sm:bottom-10 left-1/2 -translate-x-1/2 text-center w-[90%] max-w-3xl text-white">
        <h3 class="text-3xl sm:text-5xl font-bold tracking-tight drop-shadow-lg">{{ slides[currentIndex].title }}</h3>
        <p class="mt-2 sm:mt-3 text-sm sm:text-xl text-gray-100">{{ slides[currentIndex].description }}</p>
        <button class="mt-5 px-8 sm:px-10 py-2.5 sm:py-3 rounded-xl bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 transition-all text-white font-semibold shadow-xl shadow-red-900/25">
          {{ slides[currentIndex].cta }}
        </button>
      </div>
    </div>

    <div class="flex items-center justify-between gap-4 px-2 sm:px-3 pt-4 pb-1">
      <div class="text-xs sm:text-sm text-gray-500 font-medium">Slide {{ currentIndex + 1 }} von {{ slides.length }}</div>

      <div class="flex justify-center gap-2.5">
        <button
          *ngFor="let slide of slides; let i = index"
          type="button"
          (click)="goToSlide(i)"
          class="h-1.5 rounded-full transition-all"
          [ngClass]="currentIndex === i ? 'w-7 bg-orange-500' : 'w-2.5 bg-orange-200 hover:bg-orange-300'"
          [attr.aria-label]="'Gehe zu Slide ' + (i + 1)"
        ></button>
      </div>
    </div>
  </div>
</section>
