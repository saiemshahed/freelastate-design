<div class="p-4 sm:p-6 lg:p-8 bg-gray-50 min-h-screen">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 gap-4">
    <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Meine Touren</h2>
    <input type="text" placeholder="Suchen" class="w-full sm:w-64 pl-4 pr-10 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition-shadow" />
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="group border-2 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center bg-white hover:border-orange-500 hover:bg-orange-50 transition-all duration-300 cursor-pointer min-h-[360px] shadow-sm hover:shadow-md">
      <div class="flex flex-col items-center gap-4 text-center">
        <div class="w-full h-40 flex items-center justify-center mb-2 px-6">
          <div class="w-full max-w-[120px] aspect-video border-[3px] border-gray-300 rounded-lg flex items-center justify-center relative bg-gray-50 group-hover:bg-white group-hover:border-orange-200 transition-colors">
            <div class="w-8 h-8 rounded-full border-[3px] border-gray-300 absolute -top-4 -left-4 hidden sm:block"></div>
            <div class="w-8 h-8 rounded-full border-[3px] border-gray-300 absolute -top-4 -right-4 hidden sm:block"></div>
            <ng-icon name="lucidePlus" class="text-gray-300 group-hover:text-orange-200 transition-colors text-4xl"></ng-icon>
          </div>
        </div>

        <div class="w-full border-t border-gray-100 transition-colors group-hover:border-orange-200 pb-4"></div>

        <p class="font-semibold text-gray-800 text-lg group-hover:text-orange-600 transition-colors">Neue Tour erstellen</p>

        <div class="w-14 h-14 bg-white border-2 border-orange-500 rounded-full flex items-center justify-center group-hover:bg-orange-500 transition-all shadow-sm group-hover:shadow-lg group-hover:-translate-y-1 mt-2">
          <ng-icon name="lucidePlus" class="text-2xl text-orange-500 group-hover:text-white transition-colors"></ng-icon>
        </div>
      </div>
    </div>

    <div *ngFor="let item of items" class="group bg-white rounded-2xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col min-h-[360px] relative">
      <div class="h-44 w-full bg-cover bg-center relative transition-transform duration-500 group-hover:scale-[1.02]" [style.background-image]="'url(' + item.img + ')'">
        <div class="absolute top-2 right-2 bg-orange-500 text-white text-xs font-bold px-2 py-1 rounded-md shadow-sm">{{ item.size }}</div>
        <div class="absolute bottom-2 right-2 bg-white/95 backdrop-blur text-green-600 text-xs font-semibold px-2 py-1 rounded-full flex items-center gap-1 shadow-sm"><ng-icon name="lucideTarget" class="text-[12px]"></ng-icon>Oeffentlich</div>
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors"></div>
      </div>

      <div class="h-1 w-full bg-orange-500 scale-x-0 group-hover:scale-x-100 transition-transform duration-300 origin-left"></div>

      <div class="p-5 flex-1 flex flex-col">
        <h3 class="font-bold text-gray-800 text-center text-[17px] mb-4 group-hover:text-orange-600 transition-colors">{{ item.title }}</h3>

        <div class="space-y-1.5 text-[13px] text-gray-500 px-2 mt-auto pb-4">
          <div class="grid grid-cols-[110px_1fr] items-center">
            <span class="font-medium text-gray-400">Objekt ID:</span>
            <span class="text-gray-700 font-medium">-</span>
          </div>
          <div class="grid grid-cols-[110px_1fr] items-center">
            <span class="font-medium text-gray-400">Ansprechpartner:</span>
            <span class="text-gray-700 font-medium">-</span>
          </div>
          <div class="grid grid-cols-[110px_1fr] items-center">
            <span class="font-medium text-gray-400">Team Mitglied:</span>
            <span class="text-gray-700 font-medium">-</span>
          </div>
          <div class="grid grid-cols-[110px_1fr] items-center">
            <span class="font-medium text-gray-400">Erstellt am:</span>
            <span class="text-gray-700 font-medium">{{ item.date }}</span>
          </div>
        </div>

        <div class="absolute left-0 bottom-0 w-full p-4 bg-gradient-to-t from-white via-white to-transparent translate-y-full opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center gap-3">
          <button (click)="goToDetails(item.id)" class="w-10 h-10 rounded-full border-2 border-orange-500 text-orange-500 flex items-center justify-center hover:bg-orange-500 hover:text-white transition-colors shadow-sm cursor-pointer z-10" title="View Details"><ng-icon name="lucideMonitor" class="text-[16px]"></ng-icon></button>
          <button class="w-10 h-10 rounded-full border-2 border-orange-500 text-orange-500 flex items-center justify-center hover:bg-orange-500 hover:text-white transition-colors shadow-sm cursor-pointer z-10" title="Edit"><ng-icon name="lucidePencil" class="text-[16px]"></ng-icon></button>
          <button class="w-10 h-10 rounded-full border-2 border-orange-500 text-orange-500 flex items-center justify-center hover:bg-orange-500 hover:text-white transition-colors shadow-sm cursor-pointer z-10" title="Download"><ng-icon name="lucideDownload" class="text-[16px]"></ng-icon></button>
          <button class="w-10 h-10 rounded-full border-2 border-orange-500 text-orange-500 flex items-center justify-center hover:bg-orange-500 hover:text-white transition-colors shadow-sm cursor-pointer z-10" title="Stats"><ng-icon name="lucideChartBar" class="text-[16px]"></ng-icon></button>
        </div>
      </div>
    </div>
  </div>
</div>
